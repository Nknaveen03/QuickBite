<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> Advance Happy Birthday universe </title>
<link rel="icon" href="img/download.jpg">

<style>

body{
margin:0;
font-family:Arial;
background:#0b132b;
color:white;
text-align:center;
overflow-x:hidden;
}

/* stars */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

/* container */

.container{
padding:40px 20px;
position:relative;
z-index:2;
}

h1{
font-size:36px;
}

p{
font-size:18px;
max-width:600px;
margin:auto;
}

img{
width:220px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* buttons */

button{
margin-top:25px;
padding:14px 28px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* countdown */

#countdown{
font-size:26px;
margin-top:20px;
}

/* message */

.message{
display:none;
margin-top:20px;
font-size:22px;
}

/* gallery */

.gallery{
margin-top:40px;
}

.gallery img{
width:150px;
margin:10px;
border-radius:15px;
}

/* floating hearts */

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}

/* confetti */

.confetti{
position:fixed;
width:10px;
height:10px;
background:red;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(360deg);}
}

</style>
</head>

<body>

<audio id="bgmusic" loop>
<source src="song.mp3/Co2-(WapKing).mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1> Advance Happy Birthday My Beautiful Girl 💜</h1>

<p>
You are the most amazing part of my life.
My days became brighter the moment you entered my world.
</p>

<img src="img/WhatsApp Image 2026-03-09 at 9.57.28 PM.jpeg">

<h3>Counting the seconds until my queen's birthday 👑</h3>

<h2 id="countdown"></h2>

<button onclick="showMessage()">Click if you love me 💜</button>

<div class="message" id="msg">
<p id="typing"></p>
</div>

<br>

<button onclick="forever()"> Will you stay with me forever My Valentine? ❤️</button>

<p id="foreverText"></p>

<div class="gallery">
<h2>My Memories 📸</h2>
<img src="img/WhatsApp Image 2026-03-09 at 10.12.54 PM (1).jpeg">
<img src="img/WhatsApp Image 2026-03-09 at 10.23.36 PM.jpeg">
<img src="img/WhatsApp Image 2026-03-09 at 10.23.37 PM.jpeg">
</div>

</div>

<script>

/* star background */

for(let i=0;i<120;i++){

let star=document.createElement("div");
star.className="star";

star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";

document.body.appendChild(star);

}

/* floating hearts */

setInterval(function(){

var heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💜";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

},500);

/* countdown */

var birthday=new Date("may 25, 2026 00:00:00").getTime();

var x=setInterval(function(){

var now=new Date().getTime();
var distance=birthday-now;

var days=Math.floor(distance/(1000*60*60*24));
var hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes=Math.floor((distance%(1000*60*60))/(1000*60));
var seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
days+"d "+hours+"h "+minutes+"m "+seconds+"s ";

if(distance<0){

clearInterval(x);

document.getElementById("countdown").innerHTML="🎂 Happy Birthday My Love 💜";

confettiExplosion();

}

},1000);

/* confetti */

function confettiExplosion(){

for(let i=0;i<150;i++){

let confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";
confetti.style.background=
"rgb("+Math.random()*255+","+Math.random()*255+","+Math.random()*255+")";

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),3000);

}

}

/* love message */

function showMessage(){

document.getElementById("msg").style.display="block";

document.getElementById("bgmusic").play();

var text="You are the most beautiful part of my life. I promise to love you, support you, and stay beside you forever. Advance Happy Birthday my love ❤️";

var i=0;

function typing(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,40);

}

}

typing();

}

/* forever button */

function forever(){

document.getElementById("foreverText").innerHTML=
"💜 No matter what happens, I will always choose you.";

}

</script>

</body>
</html>
