<div>
    <input type="checkbox" name="check" value="C++">C++
    <input type="checkbox" name="check" value="Python">Python
    <input type="checkbox" name="check" value="Java">Java
</div>

<h1 id="result"></h1>


<script>
    var check = document.getElementsByName("check")
    var result = document.getElementById("result")
    skill = []

    for(count = 0;count<check.length;count+1)
{check[count].addEventListener("click",function(){
        if(event.target.checked)
    {
        console.log("checked")
        skill.push(event.target.value)
        result.textContent = skill
    }

    
        else
        {
            console.log("unchecked")
            // find index: skill = ["c++","python","java"]
            var index = skill.indexOf(event.target.value)//0
            skill.splice(index,1)
            result.textContent = skill
        }
    
        
    })
    check[0].addEventListener("click",function(){
        if(check[0].checked)
    {
        console.log("checked")
        skill.push(event.target.value)
        result.textContent = skill
    }

    
        else
        {
            console.log("unchecked")
            // find index: skill = ["c++","python","java"]
            var index = skill.indexOf(event.target.value)//0
            skill.splice(index,1)
            result.textContent = skill
        }
    
        
    })}
</script>
